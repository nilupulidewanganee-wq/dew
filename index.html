<!DOCTYPE html>
<html>
<head>
  <title>Hi Saman · Award Ceremony</title>

  <style>
    /* ─── reset & base ─── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 30% 20%, #1a2a4a, #0b1424);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1rem;
      overflow: hidden;
      position: relative;
    }

    /* subtle animated particles (floating orbs) */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.25;
      animation: floatOrb 14s infinite alternate ease-in-out;
      z-index: 0;
    }

    body::before {
      width: 50vmax;
      height: 50vmax;
      background: #00d4ff;
      top: -15%;
      left: -10%;
      animation-duration: 18s;
    }

    body::after {
      width: 40vmax;
      height: 40vmax;
      background: #a855f7;
      bottom: -15%;
      right: -10%;
      animation-duration: 22s;
      animation-delay: -5s;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, -40px) scale(1.2); }
    }

    /* ─── main card ─── */
    .card {
      position: relative;
      z-index: 2;
      background: rgba(10, 20, 40, 0.55);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border-radius: 3.5rem 1.5rem 3.5rem 1.5rem;
      padding: 4rem 4.5rem;
      max-width: 820px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.6),
        inset 0 1px 2px rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: transform 0.3s ease;
      animation: cardPop 1.1s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes cardPop {
      0% { opacity: 0; transform: scale(0.85) translateY(40px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ─── typography ─── */
    .greeting {
      font-size: clamp(2.8rem, 9vw, 5.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.2em;
      animation: fadeSlide 1.4s ease forwards;
    }

    .greeting .highlight {
      background: linear-gradient(135deg, #b7f0ff, #00d4ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.25);
      display: inline-block;
    }

    .subhead {
      font-size: clamp(1.3rem, 3.5vw, 2.2rem);
      font-weight: 400;
      color: #d6e6ff;
      letter-spacing: 0.04em;
      margin-top: 0.2rem;
      opacity: 0;
      animation: fadeSlide 1.6s 0.25s ease forwards;
    }

    .subhead span {
      display: inline-block;
      background: rgba(0, 212, 255, 0.08);
      padding: 0.3rem 1.6rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 212, 255, 0.10);
    }

    .badge {
      margin-top: 2.8rem;
      padding: 0.7rem 2.2rem;
      border-radius: 80px;
      background: linear-gradient(145deg, rgba(0, 212, 255, 0.12), rgba(167, 139, 250, 0.08));
      border: 1px solid rgba(0, 212, 255, 0.20);
      display: inline-block;
      font-size: 1rem;
      font-weight: 500;
      color: #b7e4ff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      opacity: 0;
      animation: fadeSlide 2s 0.5s ease forwards;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.04);
    }

    /* shared fade + slide up */
    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(25px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ─── glow accent ─── */
    .glow-pulse {
      animation: pulseGlow 3s infinite alternate ease-in-out;
    }

    @keyframes pulseGlow {
      0% { text-shadow: 0 0 8px rgba(0, 212, 255, 0.15), 0 0 20px rgba(0, 212, 255, 0.03); }
      100% { text-shadow: 0 0 30px rgba(0, 212, 255, 0.4), 0 0 60px rgba(0, 212, 255, 0.12); }
    }

    /* ─── responsive ─── */
    @media (max-width: 500px) {
      .card {
        padding: 2.8rem 1.8rem;
        border-radius: 2.5rem 1rem 2.5rem 1rem;
      }
      .badge {
        font-size: 0.8rem;
        padding: 0.4rem 1.4rem;
      }
    }

    /* ─── decorative sparkles ─── */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0.25;
      z-index: 1;
      pointer-events: none;
    }

    .sparkle:nth-child(1) { top: 12%; left: 8%; animation: twinkle 5s infinite alternate; }
    .sparkle:nth-child(2) { bottom: 18%; right: 10%; animation: twinkle 7s infinite alternate-reverse; width: 10px; height: 10px; opacity: 0.15; }
    .sparkle:nth-child(3) { top: 25%; right: 18%; animation: twinkle 4s infinite alternate; width: 4px; height: 4px; }
    .sparkle:nth-child(4) { bottom: 30%; left: 12%; animation: twinkle 6s infinite alternate-reverse; width: 8px; height: 8px; }

    @keyframes twinkle {
      0% { opacity: 0.1; transform: scale(0.8); }
      100% { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <!-- decorative sparkles -->
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>
  <div class="sparkle"></div>

  <!-- ─── main card ─── -->
  <div class="card">

    <!-- dynamic greeting: "Hi Saman" -->
    <h1 class="greeting glow-pulse">
      <span class="highlight" id="greetingName">Hi Saman</span>
    </h1>

    <div class="subhead">
      <span>✨ welcome to the awarding ceremony ✨</span>
    </div>

    <!-- subtle badge – no venue/time -->
    <div class="badge">
      ★ honoured guest ★
    </div>
  </div>

  <script>
    (function() {
      // get name from URL param (if any)
      const params = new URLSearchParams(window.location.search);
      let nameParam = params.get('name');

      const nameElement = document.getElementById('greetingName');

      if (nameParam) {
        nameParam = nameParam.trim();
        if (nameParam.length > 0) {
          // show "Hi " + whatever name is passed
          nameElement.innerText = "Hi " + nameParam;
        } else {
          // empty param → fallback to Saman
          nameElement.innerText = "Hi Saman";
        }
      } else {
        // no param → default "Hi Saman"
        nameElement.innerText = "Hi Saman";
      }
    })();
  </script>

</body>
</html>
